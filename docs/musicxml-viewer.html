<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChantXML MusicXML Viewer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #111111;
        --muted: #666666;
        --card: #f5f5f5;
        --accent: #174ea6;
        --border: #d0d7de;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f1115;
          --fg: #e7e9ee;
          --muted: #b3b8c4;
          --card: #171b24;
          --accent: #8ab4f8;
          --border: #313847;
        }
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.5;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
      }

      a {
        color: var(--accent);
      }

      .controls,
      .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
      }

      .controls {
        display: grid;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      button,
      input[type='file'],
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
        padding: 0.5rem 0.75rem;
        cursor: pointer;
      }

      #status {
        color: var(--muted);
        margin: 0;
      }

      #xmlEditor {
        min-height: 220px;
        resize: vertical;
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.75rem;
        box-sizing: border-box;
        background: var(--bg);
        color: var(--fg);
      }

      #score {
        overflow: auto;
        min-height: 240px;
      }

      .small {
        font-size: 0.95rem;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.9.0/build/opensheetmusicdisplay.min.js"></script>
  </head>
  <body>
    <main>
      <h1>MusicXML Viewer</h1>
      <p class="small">
        Load a local MusicXML file or the bundled Twinkle sample, edit XML directly, then render notation in your browser.
        Rendering uses
        <a href="https://opensheetmusicdisplay.org/">OpenSheetMusicDisplay</a>.
      </p>

      <section class="controls" aria-label="Viewer controls">
        <label for="musicxmlFile">Open local MusicXML file</label>
        <input id="musicxmlFile" type="file" accept=".xml,.musicxml,.mxl,application/xml,text/xml" />

        <div class="button-row">
          <button id="loadSample" type="button">Load Twinkle sample</button>
          <button id="renderXml" type="button">Render XML</button>
          <button id="resetView" type="button">Clear</button>
          <a href="./index.html">Back to docs home</a>
        </div>

        <label for="xmlEditor">MusicXML editor</label>
        <textarea id="xmlEditor" spellcheck="false" placeholder="Paste or load MusicXML here, then click Render XML."></textarea>

        <p id="status" role="status">Ready.</p>
      </section>

      <section class="panel" id="score" aria-label="MusicXML rendering area"></section>
    </main>

    <script>
      const scoreContainer = document.getElementById('score');
      const statusNode = document.getElementById('status');
      const fileInput = document.getElementById('musicxmlFile');
      const loadSampleButton = document.getElementById('loadSample');
      const renderButton = document.getElementById('renderXml');
      const resetButton = document.getElementById('resetView');
      const xmlEditor = document.getElementById('xmlEditor');

      let osmd;

      function setStatus(message) {
        statusNode.textContent = message;
      }

      async function ensureRenderer() {
        if (!window.opensheetmusicdisplay || !window.opensheetmusicdisplay.OpenSheetMusicDisplay) {
          throw new Error('OpenSheetMusicDisplay did not load.');
        }

        if (!osmd) {
          osmd = new window.opensheetmusicdisplay.OpenSheetMusicDisplay(scoreContainer, {
            autoResize: true,
            drawTitle: true,
          });
        }
      }

      async function renderMusicXML(xmlText, description) {
        if (!xmlText.trim()) {
          setStatus('Editor is empty. Load or paste MusicXML first.');
          return;
        }

        try {
          await ensureRenderer();
          await osmd.load(xmlText);
          osmd.render();
          setStatus(`Rendered ${description}.`);
        } catch (error) {
          console.error(error);
          setStatus(`Could not render ${description}: ${error.message}`);
        }
      }

      fileInput.addEventListener('change', async (event) => {
        const [file] = event.target.files;
        if (!file) {
          return;
        }

        try {
          const text = await file.text();
          xmlEditor.value = text;
          setStatus(`Loaded local file \"${file.name}\" into editor. Click Render XML.`);
        } catch (error) {
          console.error(error);
          setStatus(`Could not read \"${file.name}\": ${error.message}`);
        }
      });

      loadSampleButton.addEventListener('click', async () => {
        setStatus('Loading Twinkle sample...');
        try {
          const response = await fetch('./samples/twinkle-twinkle-little-star.musicxml');
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          xmlEditor.value = await response.text();
          setStatus('Loaded Twinkle sample into editor. Click Render XML.');
        } catch (error) {
          console.error(error);
          setStatus(`Could not load sample: ${error.message}`);
        }
      });

      renderButton.addEventListener('click', async () => {
        await renderMusicXML(xmlEditor.value, 'editor contents');
      });

      resetButton.addEventListener('click', () => {
        scoreContainer.textContent = '';
        fileInput.value = '';
        xmlEditor.value = '';
        setStatus('Cleared viewer and editor.');
      });
    </script>
  </body>
</html>
